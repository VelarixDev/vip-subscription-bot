<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Subscription</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-secondary-bg-color: #f4f4f5;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-link-color: #2481cc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            background: linear-gradient(45deg, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--tg-theme-hint-color);
            font-size: 14px;
            margin-top: 8px;
        }

        .plans-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .plan-card {
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Premium effects */
        .plan-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .plan-card:active {
            transform: scale(0.98);
        }

        .plan-card.best-value {
            border: 2px solid #ffca28;
            background: linear-gradient(145deg, var(--tg-theme-secondary-bg-color), #fff9e6);
        }

        .plan-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .plan-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .plan-price {
            font-size: 24px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin-bottom: 15px;
        }

        .plan-duration {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
            margin-bottom: 20px;
        }

        .buy-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .buy-button:active {
            opacity: 0.8;
        }

        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ffca28;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        /* Dark mode adjustments */
        @media (prefers-color-scheme: dark) {
            .plan-card.best-value {
                background: linear-gradient(145deg, #2c2c2e, #3a3a3c);
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VIP Access</h1>
        <p>Выберите подходящий тарифный план</p>
    </div>

    <div class="plans-container">
        <!-- 1 Month -->
        <div class="plan-card" onclick="buyPlan('1_month', 10, 30)">
            <div class="plan-icon">🥉</div>
            <div class="plan-name">1 Месяц</div>
            <div class="plan-price">$10</div>
            <div class="plan-duration">Доступ на 30 дней</div>
            <button class="buy-button">Купить</button>
        </div>

        <!-- 3 Months -->
        <div class="plan-card" onclick="buyPlan('3_months', 25, 90)">
            <div class="plan-icon">🥈</div>
            <div class="plan-name">3 Месяца</div>
            <div class="plan-price">$25</div>
            <div class="plan-duration">Скидка 17%!</div>
            <button class="buy-button">Купить</button>
        </div>

        <!-- 1 Year -->
        <div class="plan-card best-value" onclick="buyPlan('1_year', 90, 365)">
            <div class="badge">Лучшая цена!</div>
            <div class="plan-icon">🥇</div>
            <div class="plan-name">1 Год</div>
            <div class="plan-price">$90</div>
            <div class="plan-duration">Максимальная выгода</div>
            <button class="buy-button">Купить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        // Расширяем интерфейс под тему Telegram
        tg.expand();

        function buyPlan(id, price, duration) {
            const planData = {
                'id': id,
                'price': price,
                'duration': duration
            };

            // Отправляем данные боту
            tg.sendData(JSON.stringify(planData));
            
            // Закрываем Mini App
            tg.close();
        }

        // Добавляем визуальный отклик при нажатии на карточки (через onclick в HTML)
    </script>
</body>
</html>
